name: 彩虹云安卓编译

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Checkout submodules
        run: git submodule update --init --recursive --force

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: 21

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: ${{ runner.os }}-go-

      - name: Update CA
        run: |
          sudo apt-get update && sudo apt-get install -y ca-certificates
          sudo update-ca-certificates
          cp -f /etc/ssl/certs/ca-certificates.crt core/src/foss/golang/clash/component/ca/ca-certificates.crt

      - name: 配置签名
        env:
          SIGNING_STORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          SIGNING_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          SIGNING_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          SIGNING_KEY_BASE64: ${{ secrets.ANDROID_SIGNING_KEY }}
        run: |
          echo "$SIGNING_KEY_BASE64" | base64 -d > release.keystore
          touch signing.properties
          echo keystore.path=../release.keystore > signing.properties
          echo keystore.password="$SIGNING_STORE_PASSWORD" >> signing.properties
          echo key.alias="$SIGNING_KEY_ALIAS" >> signing.properties
          echo key.password="$SIGNING_KEY_PASSWORD" >> signing.properties

      - name: 编译 APK
        run: ./gradlew --no-daemon app:assembleMetaRelease

      - name: 重命名 APK
        run: |
          mkdir -p dist
          # 取 arm64-v8a(纯64位)包 ~45MB：覆盖2015年后所有手机(含新款纯64位机)，
          # 且不超 Telegram 机器人 50MB 上传上限。通用包102MB会超限，纯v7a(32位)新机装不上。
          f=$(find app/build/outputs/apk/meta/release -name "*arm64-v8a*.apk" | head -1)
          if [ -z "$f" ]; then
            echo "未找到 arm64 APK，回退取 universal"
            f=$(find app/build/outputs/apk/meta/release -name "*universal*.apk" | head -1)
          fi
          echo "选用 APK: $f"
          cp "$f" dist/彩虹云-android.apk
          ls -lh dist/彩虹云-android.apk
          unzip -l dist/彩虹云-android.apk | grep -oE 'lib/[^/]+/' | sort -u

      - name: 上传 APK
        uses: actions/upload-artifact@v4
        with:
          name: 彩虹云-Android
          path: dist/彩虹云-android.apk
          retention-days: 30

      - name: 发布 Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/彩虹云-android.apk
          name: 彩虹云安卓版 ${{ github.ref_name }}
